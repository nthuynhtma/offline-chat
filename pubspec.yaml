name: offline_chat
description: Offline AI Chat with RAG
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Background downloads
  background_downloader: ^9.4.0

  # Utils
  collection: ^1.18.0

  # Database
  drift: ^2.18.0

  # State Management
  equatable: ^2.0.5

  # File Parsing
  file_picker: ^8.0.0+1

  # State Management
  flutter_bloc: ^8.1.6

  # AI
  flutter_gemma: ^0.13.1

  # DI
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.0

  # File System
  path: ^1.9.0
  path_provider: ^2.1.3

  # File Parsing
  syncfusion_flutter_pdf: ^26.1.35
  sqlite3_flutter_libs: ^0.5.0

  # AI
  tflite_flutter: ^0.10.4

  # IDs
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true