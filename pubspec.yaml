name: offline_chat
description: Offline AI Chat with RAG
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Background downloads
  background_downloader: 9.5.5

  # Utils
  collection: ^1.18.0

  # Database
  drift: ^2.18.0

  # State Management
  equatable: ^2.0.5

  # File Parsing
  file_picker: ^11.0.2

  # State Management
  flutter_bloc: ^9.1.1

  # AI
  flutter_gemma: ^0.16.4

  # DI
  get_it: ^9.2.1

  # Navigation
  go_router: ^17.3.0

  # File System
  path: ^1.9.0
  path_provider: ^2.1.3

  # File Parsing
  archive: ^4.0.9
  syncfusion_flutter_pdf: ^33.2.10
  sqlite3_flutter_libs: ^0.6.0+eol

  # AI
  tflite_flutter: ^0.12.1

  # IDs
  uuid: ^4.4.0
  logger: ^2.7.0
  scrollview_observer: ^1.27.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true